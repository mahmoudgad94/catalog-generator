[phases.setup]
aptPkgs = ["...", "php-mysql", "php-intl", "php-gd", "php-mbstring", "php-xml", "php-curl"]

[phases.install]
cmds = ["composer install --optimize-autoloader"]

[phases.build]
cmds = [
    "php bin/console cache:clear --env=prod",
    "php bin/console assets:install public --env=prod"
]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction --env=prod && php bin/console doctrine:fixtures:load --no-interaction --env=prod 2>/dev/null; php -S 0.0.0.0:${PORT:-8080} -t public"
